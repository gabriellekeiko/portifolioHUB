<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabrielle Keiko | portfolioHUB</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #ffffff;
            --text-sec: #94a3b8;
            --accent: #00f0ff;
            --accent-hover: #00c3cc;
            --highlight: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: var(--accent);
            transition: all 0.3s ease;
        }

        nav {
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 8%;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 1.8rem;
        }

        .nav-links a {
            color: var(--text-sec);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        section {
            padding: 6rem 8% 4rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .section-subtitle {
            color: var(--text-sec);
            margin-bottom: 3rem;
            font-size: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.8rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid var(--accent);
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--bg-color);
        }

        .btn-primary:hover {
            background-color: transparent;
            color: var(--accent);
            transform: translateY(-2px);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--accent);
        }

        .btn-outline:hover {
            background-color: var(--accent);
            color: var(--bg-color);
            transform: translateY(-2px);
        }

        .sobre-container {
            display: flex;
            align-items: center;
            gap: 4rem;
            min-height: 70vh;
        }

        .sobre-foto-wrapper {
            flex-shrink: 0;
        }

        .sobre-foto {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--card-bg);
            box-shadow: 0 0 0 2px var(--accent);
        }

        .sobre-conteudo h1 {
            font-size: 3rem;
            line-height: 1.1;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .sobre-conteudo h2 {
            font-size: 1.3rem;
            color: var(--text-sec);
            font-weight: 400;
            margin-bottom: 1.5rem;
        }

        .sobre-conteudo p {
            font-size: 1.05rem;
            color: var(--text-sec);
            margin-bottom: 2rem;
            max-width: 750px;
        }

        .curriculo-box {
            background-color: var(--card-bg);
            padding: 3rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .curriculo-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1.5rem;
        }

        .instituicao-info h3 {
            font-size: 1.4rem;
            margin-bottom: 0.3rem;
        }

        .instituicao-info p {
            color: var(--text-sec);
        }

        .periodo-tag {
            background-color: rgba(0, 240, 255, 0.1);
            color: var(--accent);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .curriculo-detalhes ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .curriculo-detalhes li::before {
            content: "🔹";
            margin-right: 0.8rem;
        }

        .habilidades-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }

        .tech-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-content: flex-start;
        }

        .badge-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .badge-card span {
            color: var(--accent);
        }

        .pdf-viewer-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .pdf-frame {
            width: 100%;
            height: 350px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: var(--card-bg);
        }

        .repo-destaque {
            display: block;
            background: linear-gradient(90deg, var(--card-bg), rgba(0, 240, 255, 0.08));
            border: 1px solid var(--accent);
            text-align: center;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .repo-destaque:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.15);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

            transform: translateY(-6px);
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 12px 24px rgba
